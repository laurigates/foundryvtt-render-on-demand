name: "Release: release-please"

on:
  push:
    branches:
      - main
  workflow_dispatch: {}

concurrency:
  group: release-please-${{ github.repository }}
  cancel-in-progress: false

permissions:
  contents: write
  pull-requests: write

jobs:
  release-please:
    runs-on: ubuntu-latest
    steps:
      - name: Generate GitHub App Token
        id: app-token
        uses: actions/create-github-app-token@v3
        with:
          app-id: ${{ vars.RELEASE_PLEASE_APP_ID }}
          private-key: ${{ secrets.RELEASE_PLEASE_PRIVATE_KEY }}
      - uses: googleapis/release-please-action@v4
        id: release
        with:
          token: ${{ steps.app-token.outputs.token }}

      # When a release is cut, build the module, zip dist/, and attach the
      # FoundryVTT install assets to the GitHub release. The manifest URL
      # (releases/latest/download/module.json) and download URL
      # (releases/latest/download/render-on-demand.zip) resolve to these assets.
      - name: Checkout
        if: ${{ steps.release.outputs.release_created }}
        uses: actions/checkout@v4
      - name: Set up Bun
        if: ${{ steps.release.outputs.release_created }}
        uses: oven-sh/setup-bun@v2
      - name: Install dependencies
        if: ${{ steps.release.outputs.release_created }}
        run: bun install --frozen-lockfile
      - name: Build module
        if: ${{ steps.release.outputs.release_created }}
        run: bun run build
      - name: Package module zip
        if: ${{ steps.release.outputs.release_created }}
        run: |
          cd dist
          zip -r ../render-on-demand.zip .
      - name: Upload release assets
        if: ${{ steps.release.outputs.release_created }}
        env:
          GITHUB_TOKEN: ${{ steps.app-token.outputs.token }}
        run: |
          gh release upload "${{ steps.release.outputs.tag_name }}" \
            render-on-demand.zip dist/module.json --clobber
